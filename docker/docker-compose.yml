# Base compose — use with docker-compose.macvlan.yml or docker-compose.local.yml
services:
  docker-proxy:
    build:
      context: .
      dockerfile: Dockerfile.socket-proxy
    container_name: ${CAC_DOCKER_PROXY_NAME:-boris-gateway}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      docker_control:
        ipv4_address: ${CAC_DOCKER_PROXY_IP:-172.31.255.2}
    restart: unless-stopped

  cac:
    image: ${CAC_DOCKER_IMAGE:-ghcr.io/nmhjklnm/cac-docker:latest}
    container_name: ${CAC_CONTAINER_NAME:-boris-main}
    hostname: ${CAC_CONTAINER_RUNTIME_HOSTNAME:-boris-main}
    depends_on:
      - docker-proxy
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      PROXY_URI: ${PROXY_URI:?Set PROXY_URI in .env}
      SINGBOX_ENABLE: ${SINGBOX_ENABLE:-1}
      DNS_SERVER: ${DNS_SERVER:-https://1.1.1.1/dns-query}
      TUN_ADDRESS: ${TUN_ADDRESS:-172.19.0.1/30}
      TUN_MTU: ${TUN_MTU:-9000}
      DISABLE_IPV6: ${DISABLE_IPV6:-1}
      HEALTHCHECK: ${HEALTHCHECK:-1}
      DOCKER_HOST: ${CAC_CONTAINER_DOCKER_HOST:-tcp://${CAC_DOCKER_PROXY_NAME:-boris-gateway}:2375}
      CAC_PARENT_CONTAINER_NAME: ${CAC_CONTAINER_NAME:-boris-main}
      CAC_SHARED_WORKSPACE: /workspace
      CAC_SHARED_WORKSPACE_HOST: ${CAC_WORKSPACE_HOST:?Set CAC_WORKSPACE_HOST in .env}
      CAC_CHILD_CONTAINER_NETWORK_MODE: ${CAC_CHILD_CONTAINER_NETWORK_MODE:-bridge}
      CAC_CHILD_CONTAINER_PROXY_URL: ${CAC_CHILD_CONTAINER_PROXY_URL:-}
      CAC_CHILD_CONTAINER_NO_PROXY: ${CAC_CHILD_CONTAINER_NO_PROXY:-localhost,127.0.0.1,::1}
      CAC_REAL_DOCKER_BIN: /usr/local/bin/docker-real
    volumes:
      - ${CAC_DATA:-./data}/root:/root
      - ${CAC_DATA:-./data}/home:/home
      - ${CAC_WORKSPACE_HOST:?Set CAC_WORKSPACE_HOST in .env}:/workspace
    networks:
      docker_control:
        ipv4_address: ${CAC_DOCKER_CLIENT_IP:-172.31.255.3}
    working_dir: /workspace
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-lc", "ip link show tun0 >/dev/null 2>&1 && pgrep -x sing-box >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  docker_control:
    driver: bridge
    ipam:
      config:
        - subnet: ${CAC_DOCKER_CONTROL_SUBNET:-172.31.255.0/24}
